<!-- Header for sidenav -->
<header 
*ngIf="parent === 'navbar' || 'main'"
[class.desktop]="!mobileView"
>
  <img src="assets/img/logo_dabubble-mobile.png" alt="Logo_DABubble" />

  <app-navbar-searchbar *ngIf="!mobileView"></app-navbar-searchbar>

  <div
  (click)="openMenu()" 
  class="header__profil">
    <h1 *ngIf="currentUser && !mobileView">{{ currentUser.name }}</h1>

    <img
      *ngIf="currentUser"
      class="avatar-small"
      src="{{ currentUser.photoUrl }}"
      alt="avatar"
    />

    <mat-icon *ngIf="!mobileView">keyboard_arrow_down</mat-icon>
  </div>
</header>

<!-- Header for channels, threads and private chats -->
<header *ngIf="parent === 'chat'">
  <div (click)="navigateBack()" class="logo__container">
    <mat-icon>keyboard_arrow_left</mat-icon>
    <img src="assets/img/workspace.png" alt="Logo of the current workspace" />
    <span>Code learning</span>
  </div>
  <img
    (click)="openMenu()"
    *ngIf="currentUser"
    class="avatar-small"
    src="{{ currentUser.photoUrl }}"
    alt="avatar"
  />
</header>
