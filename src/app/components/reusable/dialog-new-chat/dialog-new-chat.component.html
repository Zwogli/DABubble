<div 
class="overlay" 
(click)="closeDialogNewChat()"
*ngIf="dialogService.showDialogNewChat$ | async"
></div>

<div 
[class.dialog__desktop]="(dialogService.showDialogNewChat$ | async) && !(this.responsiveService.mobileView$ | async)" 
[class.dialog__mobile]="this.responsiveService.mobileView$ | async" 
[class.slide--up]="!showCloseAnimation && (dialogService.showDialogNewChat$ | async) && (this.responsiveService.mobileView$ | async)"
[class.slide--down]="showCloseAnimation && (this.responsiveService.mobileView$ | async)"
>

    <div 
    (click)="closeDialogNewChat()"
    *ngIf="this.responsiveService.mobileView$ | async" 
    class="orientation"
    >
        <div>
            <span></span>
        </div>
    </div>

    <div class="container__header">
        <span>Add User</span>
        <span 
        (click)="closeDialogNewChat()" 
        class="material-icons-outlined close__element"
        *ngIf="!(this.responsiveService.mobileView$ | async)"
        > close </span>
    </div>

    <form class="search-user-form">
        <div class="container__search">
            <div class="input__label">
                <input 
                id="searchbar-newChat"
                #searchbarUser
                (click)="removeUser()"
                (keyup)="searchForUser()"
                type="text" 
                placeholder="Search user">

                <label 
                *ngIf="this.isAlreadyInChat"
                for="searchbarUser" 
                class="block__alert">
                *User chat already open
                </label>

                <!-- 
                    selected User 
                -->
                
                <div 
                *ngFor="let user of this.selectedUser"
                class="container__user-Elements--selected" 
                >
                    <img class="avatar-icon" src="{{ user.photoUrl}}" alt="avatar">

                    <p>{{ user.name }}</p>

                    <span class="material-icons-outlined close__element"
                    (click)="removeUser()"
                    *ngIf="user != this.currentUser">
                        close 
                    </span>
                </div>

            </div>

            <!-- 
                render filtered User 
            -->
            <div id="filtered-user" 
            class="container__filteredUser"
            *ngIf="this.filteredUser.length >= 1"
            >
                <div 
                *ngFor="let user of this.filteredUser"
                class="container__user-Elements" 
                (click)="selectUser(user)"
                >
                    <div class="container__user-Elements--avatar">
                        <img class="avatar-small" src="{{ user.photoUrl}}" alt="avatar">
                        <span class="onlinestatus onlinestatus--color-{{ user.onlineStatus }}"></span>
                    </div>

                    <p>{{ user.name }}</p>
                </div>
            </div>
        </div>

        <button 
        class="btn__submit"
        (click)="submitNewChat()"
        [disabled]="this.userSelected"
        [class.btn-disabled]="this.userSelected">
            Add
        </button>
    </form>
</div>
