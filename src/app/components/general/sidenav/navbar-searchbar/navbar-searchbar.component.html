<main 
[class.element__margin--bottom]="responsiveService.mobileView$ | async">

    <div class="searchbar">
        <input 
        #searchbarNavbar
        (keyup)="searchFor()"
        name="searchbar" 
        type="text" 
        placeholder="Go to...">
        <label for="searchbar">
            <span class="material-icons-outlined"> search </span>
        </label>
    </div>

    <div 
    class="container__result"
    *ngIf="searchbarActive">

        <div class="container__result--section">
            <span class="container__result--section-header">Channel:</span>
                <span *ngIf="(searchCacheChannel.length == 0)">
                    No such entrys
                </span>

                <div *ngFor="let channel of searchCacheChannel">
                    <h1>{{ channel.name }}</h1>
                </div>
        </div>

        <div class="container__result--section">
            <span class="container__result--section-header">
                User:
            </span>

            <span *ngIf="(searchCacheUser.length == 0)">
                No such entrys
            </span>
                
            <div *ngFor="let user of searchCacheUser"> 
                <div 
			    class="container__Elements--row">

				    <div class="user__container--avatar">
				        <img class="avatar-small" src="{{ user.photoUrl}}" alt="avatar">
				        <span class="onlinestatus onlinestatus--color-{{ user.onlineStatus }}"></span>
				    </div>

				    <p>{{ user.name}}
				        <span *ngIf="user.id == currentUser.id">(You)</span>
				    </p>
			    </div>
            </div>
        </div>
    </div>
</main>
